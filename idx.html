    <script src="https://unpkg.com/hanzi-writer@3.7.3/dist/hanzi-writer.min.js"></script>
    <script>
        // е…ЁеұҖеҸҳйҮҸеӯҳеӮЁеҠЁз”»е®һдҫӢ
        let writer = null;
        const animationContainer = document.getElementById('character-animation');
        const hanziInput = document.getElementById('hanzi-input');
        const generateBtn = document.getElementById('generate-btn');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const speedControl = document.getElementById('speed-control');
        const strokeOrderArea = document.getElementById('stroke-order-area');
        const strokeOrderContainer = document.getElementById('stroke-order-container');

        // з”ҹжҲҗеҠЁз”»еҮҪж•°
        function generateAnimation(character) {
            // жё…йҷӨеҺҹжңүеҠЁз”»
            if (writer) {
                writer.cancelQuiz();
                // жё…з©әе®№еҷЁдёӯзҡ„ SVG е…ғзҙ 
                const svgElements = animationContainer.querySelectorAll('svg');
                svgElements.forEach(svg => svg.remove());
            }

            // еҲӣе»әж–°зҡ„еҠЁз”»е®һдҫӢ
            writer = HanziWriter.create(animationContainer, character, {
                width: 250,          // еҠЁз”»е®ҪеәҰ
                height: 250,         // еҠЁз”»й«ҳеәҰ
                padding: 30,         // еўһеҠ еҶ…иҫ№и·қпјҢи®©жұүеӯ—жӣҙеҘҪең°йҖӮеә”з”°еӯ—жЎҶ
                strokeAnimationSpeed: 1, // еҲқе§ӢйҖҹеәҰ
                showStrokeNumbers: true, // жҳҫзӨәз¬”з”»еәҸеҸ·
                strokeColor: '#333', // з¬”з”»йўңиүІ
                radicalColor: '#f00', // йғЁйҰ–йўңиүІпјҲеҰӮжңүпјү
                showOutline: true,   // жҳҫзӨәиҪ®е»“
                outlineColor: '#ddd' // иҪ®е»“йўңиүІ
            });

            // еҲқе§ӢеҢ–е№¶ж’ӯж”ҫеҠЁз”»
            writer.hideCharacter().then(() => {
                writer.animateCharacter(); // иҮӘеҠЁж’ӯж”ҫдёҖж¬Ў
                // жҳҫзӨәз¬”йЎә
                displayStrokeOrder(character);
            }).catch(err => {
                alert('жҡӮдёҚж”ҜжҢҒиҜҘжұүеӯ—зҡ„з¬”йЎәеҠЁз”»пјҢиҜ·жӣҙжҚўеёёз”Ёжұүеӯ—йҮҚиҜ•пјҒ');
                console.error('еҠ иҪҪеӨұиҙҘпјҡ', err);
            });
        }

        // жҳҫзӨәз¬”йЎә
        async function displayStrokeOrder(character) {
            try {
                // жё…з©әе®№еҷЁ
                strokeOrderContainer.innerHTML = '';
                
                // еҠ иҪҪжұүеӯ—ж•°жҚ®иҺ·еҸ–з¬”з”»ж•°
                const response = await fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1/${character}.json`);
                if (!response.ok) {
                    strokeOrderArea.style.display = 'none';
                    return;
                }
                
                const charData = await response.json();
                const strokeCount = charData.strokes.length;
                
                // иҺ·еҸ–з¬”з”»зұ»еһӢ
                const strokeTypes = getStrokeTypes(character);
                
                // дёәжҜҸдёӘз¬”з”»еҲӣе»әжҳҫзӨәйЎ№
                for (let i = 0; i < strokeCount; i++) {
                    const strokeItem = document.createElement('div');
                    strokeItem.className = 'stroke-item';
                    
                    // еҲӣе»әе®№еҷЁ
                    const strokeContainer = document.createElement('div');
                    strokeContainer.id = `stroke-container-${i}`;
                    strokeContainer.style.width = '50px';
                    strokeContainer.style.height = '50px';
                    
                    // иҺ·еҸ–з¬”з”»зұ»еһӢ
                    const strokeType = strokeTypes[i] || identifyStrokeType(charData.medians[i]);
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'stroke-name';
                    nameSpan.textContent = strokeType;
                    
                    strokeItem.appendChild(strokeContainer);
                    strokeItem.appendChild(nameSpan);
                    strokeOrderContainer.appendChild(strokeItem);
                    
                    // дҪҝз”Ё HanziWriter еҲӣе»әеҚ•дёӘз¬”з”»
                    const strokeWriter = HanziWriter.create(strokeContainer, character, {
                        width: 50,
                        height: 50,
                        padding: 5,
                        showOutline: false,
                        showCharacter: true,
                        strokeAnimationSpeed: 0,
                        strokeColor: '#333',
                        radicalColor: null
                    });
                    
                    // еҸӘжҳҫзӨәз¬¬ i з¬”
                    strokeWriter.hideCharacter().then(() => {
                        // дҪҝз”Ё quiz жЁЎејҸпјҢд»Һз¬¬ i з¬”ејҖе§Ӣ
                        strokeWriter.quiz({
                            quizStartStrokeNum: i,
                            leniency: 1,
                            markStrokeCorrectAfterMisses: 0
                        });
                        
                        // з«ӢеҚіе®ҢжҲҗеҪ“еүҚз¬”з”»
                        setTimeout(() => {
                            strokeWriter.skipQuizStroke();
                        }, 50);
                    });
                    
                    // ж·»еҠ еҲҶйҡ”з¬ҰпјҲйҷӨдәҶжңҖеҗҺдёҖдёӘпјү
                    if (i < strokeCount - 1) {
                        const separator = document.createElement('span');
                        separator.className = 'stroke-separator';
                        separator.textContent = 'гҖҒ';
                        strokeOrderContainer.appendChild(separator);
                    }
                }
                
                // жҳҫзӨәз¬”йЎәеҢәеҹҹ
                strokeOrderArea.style.display = 'block';
                
            } catch (err) {
                console.error('еҠ иҪҪз¬”йЎәеӨұиҙҘпјҡ', err);
                strokeOrderArea.style.display = 'none';
            }
        }

                'д№Ұ': ['жЁӘжҠҳ', 'жЁӘжҠҳй’©', 'з«–'],
                'жң¬': ['жЁӘ', 'з«–', 'ж’Ү', 'жҚә', 'жЁӘ'],
                'з¬”': ['ж’Ү', 'жЁӘ', 'жЁӘ', 'з«–ејҜй’©', 'жЁӘ', 'з«–'],
                'зәё': ['ж’Ү', 'жЁӘжҠҳ', 'жЁӘжҠҳ', 'з«–ејҜй’©', 'ж–ңй’©', 'зӮ№'],
                'ж–Ү': ['зӮ№', 'жЁӘ', 'ж’Ү', 'жҚә'],
                'з« ': ['зӮ№', 'жЁӘ', 'з«–', 'жЁӘжҠҳ', 'жЁӘ', 'з«–', 'жЁӘ', 'жЁӘ', 'з«–', 'жЁӘ', 'з«–'],
                'еҸҘ': ['ж’Ү', 'жЁӘжҠҳй’©', 'еҸЈ'],
                'иҜқ': ['зӮ№', 'жЁӘжҠҳ', 'жЁӘ', 'з«–ејҜй’©', 'ж’Ү', 'жЁӘ', 'з«–ејҜй’©'],
                'иҜӯ': ['зӮ№', 'жЁӘжҠҳ', 'жЁӘ', 'з«–ејҜй’©', 'жЁӘ', 'з«–', 'жЁӘжҠҳ', 'жЁӘ', 'з«–ејҜй’©'],
                'й—®': ['зӮ№', 'з«–', 'жЁӘжҠҳй’©', 'еҸЈ'],
                'зӯ”': ['ж’Ү', 'жЁӘ', 'з«–', 'ж’Ү', 'жҚә', 'жЁӘ', 'з«–', 'жЁӘжҠҳ', 'жЁӘ', 'з«–', 'жЁӘ']
            };
            
            return strokeDatabase[character] || [];
        }

        // иҜҶеҲ«з¬”з”»зұ»еһӢ
        function identifyStrokeType(medians) {
            try {
                if (!medians || medians.length < 2) return 'зӮ№';
                
                const start = medians[0];
                const end = medians[medians.length - 1];
                const dx = end[0] - start[0];
                const dy = end[1] - start[1];
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                
                // и®Ўз®—дё»иҰҒж–№еҗ‘
                const mainAngle = Math.atan2(dy, dx);
                const mainAngleDeg = mainAngle * 180 / Math.PI;
                
                // и®Ўз®—ж–№еҗ‘еҸҳеҢ–ж¬Ўж•°
                let directionChanges = 0;
                let lastAngle = null;
                
                for (let i = 1; i < medians.length; i++) {
                    const prev = medians[i - 1];
                    const curr = medians[i];
                    const angle = Math.atan2(curr[1] - prev[1], curr[0] - prev[0]);
                    
                    if (lastAngle !== null) {
                        let angleDiff = Math.abs(angle - lastAngle);
                        if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
                        if (angleDiff > Math.PI / 3) {
                            directionChanges++;
                        }
                    }
                    lastAngle = angle;
                }
                
                // жЈҖжҹҘжҳҜеҗҰжңүй’©
                const hasHook = checkForHook(medians);
                
                // еҲӨж–ӯз¬”з”»зұ»еһӢ
                if (medians.length < 5) {
                    return 'зӮ№';
                }
                
                // жңүй’©зҡ„жғ…еҶө
                if (hasHook) {
                    if (absDx > absDy) {
                        return 'жЁӘй’©';
                    } else {
                        return 'з«–й’©';
                    }
                }
                
                // жңүжҠҳзҡ„жғ…еҶө
                if (directionChanges >= 1) {
                    if (absDx > absDy) {
                        return 'жЁӘжҠҳ';
                    } else {
                        return 'з«–жҠҳ';
                    }
                }
                
                // еҹәжң¬з¬”з”»
                if (absDx > absDy * 1.5) {
                    return 'жЁӘ';
                } else if (absDy > absDx * 1.5) {
                    return 'з«–';
                } else if (mainAngleDeg < -45 && mainAngleDeg > -135) {
                    return 'ж’Ү';
                } else if (mainAngleDeg > 45 && mainAngleDeg < 135) {
                    return 'жҚә';
                } else if (dy < 0) {
                    return 'ж’Ү';
                } else {
                    return 'зӮ№';
                }
            } catch (err) {
                console.error('з¬”з”»иҜҶеҲ«й”ҷиҜҜпјҡ', err);
                return 'зӮ№';
            }
        }

        // жЈҖжҹҘжҳҜеҗҰжңүй’©
        function checkForHook(medians) {
            try {
                if (medians.length < 8) return false;
                
                // жЈҖжҹҘжңҖеҗҺеҮ дёӘзӮ№зҡ„ж–№еҗ‘еҸҳеҢ–
                const lastPoints = medians.slice(-4);
                if (lastPoints.length < 3) return false;
                
                const p1 = lastPoints[0];
                const p2 = lastPoints[1];
                const p3 = lastPoints[2];
                const p4 = lastPoints[3];
                
                // и®Ўз®—жңҖеҗҺдёҖж®өзҡ„ж–№еҗ‘
                const dx1 = p2[0] - p1[0];
                const dy1 = p2[1] - p1[1];
                const dx2 = p4[0] - p3[0];
                const dy2 = p4[1] - p3[1];
                
                const angle1 = Math.atan2(dy1, dx1);
                const angle2 = Math.atan2(dy2, dx2);
                let angleDiff = Math.abs(angle1 - angle2);
                if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
                
                // еҰӮжһңж–№еҗ‘еҸҳеҢ–и¶…иҝҮ60еәҰпјҢи®Өдёәжңүй’©
                return angleDiff > Math.PI / 3;
            } catch (err) {
                console.error('й’©жЈҖжөӢй”ҷиҜҜпјҡ', err);
                return false;
            }
        }

        // з»‘е®ҡз”ҹжҲҗжҢүй’®дәӢд»¶
        generateBtn.addEventListener('click', () => {
            const inputText = hanziInput.value.trim();
            // йӘҢиҜҒиҫ“е…ҘпјҲд»…еҚ•дёӘжұүеӯ—пјү
            if (!inputText || inputText.length !== 1 || !/^[\u4e00-\u9fa5]$/.test(inputText)) {
                alert('иҜ·иҫ“е…ҘеҚ•дёӘжңүж•Ҳзҡ„жұүеӯ—пјҒ');
                return;
            }
            generateAnimation(inputText);
        });

        // ж’ӯж”ҫжҢүй’®
        playBtn.addEventListener('click', () => {
            if (writer) {
                writer.resumeAnimation();
            }
        });

        // жҡӮеҒңжҢүй’®
        pauseBtn.addEventListener('click', () => {
            if (writer) {
                writer.pauseAnimation();
            }
        });

        // йҮҚзҪ®жҢүй’®
        resetBtn.addEventListener('click', () => {
            if (writer) {
                writer.cancelQuiz();
                writer.hideCharacter().then(() => {
                    writer.animateCharacter();
                });
            }
        });

        // йҖҹеәҰжҺ§еҲ¶
        speedControl.addEventListener('change', () => {
            if (writer) {
                writer.setStrokeAnimationSpeed(parseFloat(speedControl.value));
            }
        });

        // еӣһиҪҰи§ҰеҸ‘з”ҹжҲҗ
        hanziInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                generateBtn.click();
            }
        });
    </script>
